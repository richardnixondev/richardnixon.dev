http:
  middlewares:
    crowdsec-bouncer:
      forwardAuth:
        address: http://crowdsec-bouncer:8080/api/v1/forwardAuth
        trustForwardHeader: true

  routers:
    platform:
      rule: "Host(`richardnixon.dev`) || Host(`www.richardnixon.dev`)"
      entryPoints:
        - websecure
      service: platform
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

    wordpress:
      rule: "Host(`richardemanu.com`) || Host(`www.richardemanu.com`)"
      entryPoints:
        - websecure
      service: wordpress
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

    umami:
      rule: "Host(`analytics.richardnixon.dev`)"
      entryPoints:
        - websecure
      service: umami
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

    portainer:
      rule: "Host(`portainer.richardnixon.dev`)"
      entryPoints:
        - websecure
      service: portainer
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

    grafana:
      rule: "Host(`status.richardnixon.dev`)"
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

    valheim-status:
      rule: "Host(`valheim.richardnixon.dev`)"
      entryPoints:
        - websecure
      service: valheim-status
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsencrypt

  services:
    platform:
      loadBalancer:
        servers:
          - url: "http://platform-web:8000"

    wordpress:
      loadBalancer:
        servers:
          - url: "http://wordpress:80"

    umami:
      loadBalancer:
        servers:
          - url: "http://umami:3000"

    portainer:
      loadBalancer:
        servers:
          - url: "http://portainer:9000"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    valheim-status:
      loadBalancer:
        servers:
          - url: "http://valheim-status:80"
