<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Realms - Valheim Server</title>
    <!-- Umami Analytics -->
    <script defer src="https://analytics.richardnixon.dev/script.js" data-website-id="1cf2cb07-2d73-4f89-892e-43075cbd2343"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: #4ade80;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            margin: 20px 0;
        }

        .status-badge.online {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .status-badge.offline {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .status-badge.loading {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .online .pulse {
            background: #4ade80;
        }

        .offline .pulse {
            background: #f87171;
        }

        .loading .pulse {
            background: #fbbf24;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .connect-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .connect-section h3 {
            color: #4ade80;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .connect-address {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
        }

        .connect-address code {
            flex: 1;
            color: #fff;
        }

        .copy-btn {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: #3b82f6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }

        .error-message {
            text-align: center;
            padding: 20px;
            color: #f87171;
        }

        .players-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .players-section h3 {
            color: #4ade80;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-tag {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-tag::before {
            content: "⚔️";
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">⚔️</div>
                <h1 id="server-name">Emerald Realms</h1>
                <p class="subtitle">Valheim Dedicated Server</p>

                <div id="status-badge" class="status-badge loading">
                    <span class="pulse"></span>
                    <span id="status-text">Checking...</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="players">-</div>
                    <div class="stat-label">Players Online</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">🌍</div>
                    <div class="stat-value" id="world">-</div>
                    <div class="stat-label">World</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value" id="uptime">-</div>
                    <div class="stat-label">Uptime</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">🎮</div>
                    <div class="stat-value" id="version">-</div>
                    <div class="stat-label">Version</div>
                </div>
            </div>

            <div id="players-section" class="players-section" style="display: none;">
                <h3>Online Players</h3>
                <div id="players-list" class="players-list"></div>
            </div>

            <div class="connect-section">
                <h3>Connect to Server</h3>
                <div class="connect-address">
                    <code id="server-address">valheim.richardnixon.dev:2456</code>
                    <button class="copy-btn" onclick="copyAddress()">Copy</button>
                </div>
            </div>

            <div class="footer">
                <p>Auto-refreshes every 30 seconds</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const badge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');

            try {
                const response = await fetch('/api/status.json');

                if (!response.ok) {
                    throw new Error('Server unreachable');
                }

                const data = await response.json();

                // Update status badge
                badge.className = 'status-badge online';
                statusText.textContent = 'Online';

                // Update stats
                document.getElementById('players').textContent =
                    `${data.player_count || 0} / 10`;

                // World name is not in API, use configured name
                document.getElementById('world').textContent = 'EmeraldRealms';

                // Parse version from keywords (format: "g=0.221.6,n=35,m=")
                let version = '-';
                if (data.keywords) {
                    const match = data.keywords.match(/g=([0-9.]+)/);
                    if (match) version = match[1];
                }
                document.getElementById('version').textContent = version;

                // Show uptime from API or fetch from uptime endpoint
                fetchUptime();

                // Show players list if any
                const playersSection = document.getElementById('players-section');
                const playersList = document.getElementById('players-list');

                if (data.players && data.players.length > 0) {
                    playersSection.style.display = 'block';
                    playersList.innerHTML = data.players
                        .map((p, i) => {
                            const duration = p.duration ? formatDuration(p.duration) : '';
                            return `<span class="player-tag">Viking ${i + 1}${duration ? ' (' + duration + ')' : ''}</span>`;
                        })
                        .join('');
                } else {
                    playersSection.style.display = 'none';
                }

                // Update server name if available
                if (data.server_name) {
                    document.getElementById('server-name').textContent = data.server_name;
                }

            } catch (error) {
                console.error('Failed to fetch status:', error);
                badge.className = 'status-badge offline';
                statusText.textContent = 'Offline';

                document.getElementById('players').textContent = '-';
                document.getElementById('world').textContent = '-';
                document.getElementById('uptime').textContent = '-';
                document.getElementById('version').textContent = '-';
            }
        }

        function formatUptime(seconds) {
            if (!seconds || seconds < 0) return '-';

            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);

            if (days > 0) {
                return `${days}d ${hours}h`;
            } else if (hours > 0) {
                return `${hours}h ${minutes}m`;
            } else {
                return `${minutes}m`;
            }
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const hours = Math.floor(mins / 60);
            if (hours > 0) {
                return `${hours}h ${mins % 60}m`;
            }
            return `${mins}m`;
        }

        async function fetchUptime() {
            try {
                const response = await fetch('/api/uptime');
                if (response.ok) {
                    const data = await response.json();
                    if (data.uptime_seconds) {
                        document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);
                    }
                }
            } catch (e) {
                document.getElementById('uptime').textContent = 'Running';
            }
        }

        function copyAddress() {
            const address = document.getElementById('server-address').textContent;
            navigator.clipboard.writeText(address).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Initial fetch
        fetchStatus();

        // Refresh every 30 seconds
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
